<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fix Wiring</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #11141a;
      color: #e0e6ed;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    #task-container {
      width: 580px;
      height: 440px;
      background: linear-gradient(135deg, #1b202c 0%, #0d1017 100%);
      border: 4px solid #2d3748;
      border-radius: 16px;
      position: relative;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(0, 213, 255, 0.1);
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .header {
      background: #161b26;
      padding: 12px 20px;
      border-bottom: 2px solid #2d3748;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: #00d5ff;
      text-shadow: 0 0 8px rgba(0, 213, 255, 0.4);
      text-transform: uppercase;
    }

    .status {
      font-size: 0.85rem;
      color: #ff3b30;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: rgba(255, 59, 48, 0.1);
      padding: 4px 10px;
      border: 1px solid rgba(255, 59, 48, 0.3);
      border-radius: 4px;
      animation: pulse 1.5s infinite alternate;
    }

    @keyframes pulse {
      0% { opacity: 0.6; box-shadow: 0 0 2px rgba(255,59,48,0.2); }
      100% { opacity: 1; box-shadow: 0 0 8px rgba(255,59,48,0.4); }
    }

    .wiring-board {
      position: relative;
      flex-grow: 1;
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      box-sizing: border-box;
    }

    /* SVG overlay for drawing wires */
    #wiring-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .wire-column {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      height: 100%;
      z-index: 3;
    }

    .wire-node {
      display: flex;
      align-items: center;
      height: 45px;
      position: relative;
    }

    .node-label {
      font-size: 0.75rem;
      color: #8f9cae;
      position: absolute;
    }

    .left-col .node-label {
      right: -50px;
    }

    .right-col .node-label {
      left: -50px;
    }

    .connector {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 3px 6px rgba(0,0,0,0.5);
      position: relative;
      border: 2px solid #2d3748;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .connector:hover {
      transform: scale(1.15);
      box-shadow: 0 0 10px currentColor;
    }

    .connector::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 0 4px rgba(255,255,255,1);
    }

    /* Colors */
    .red { background-color: #ff3b30; color: #ff3b30; }
    .blue { background-color: #007aff; color: #007aff; }
    .yellow { background-color: #ffcc00; color: #ffcc00; }
    .magenta { background-color: #ff2d55; color: #ff2d55; }

    /* Success Overlay */
    #success-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(13, 16, 23, 0.95);
      z-index: 10;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .success-banner {
      color: #34c759;
      font-size: 2.2rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 10px;
      text-shadow: 0 0 15px rgba(52, 199, 89, 0.5);
      animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .success-sub {
      font-size: 0.9rem;
      color: #8f9cae;
      letter-spacing: 1px;
    }

    /* Wire spark style */
    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 6px #00d5ff;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div id="task-container">
    <div class="header">
      <h1>Fix Wiring</h1>
      <div id="status-badge" class="status">Incomplete</div>
    </div>

    <div class="wiring-board" id="board">
      <svg id="wiring-svg"></svg>
      
      <!-- Left Column (Source Nodes) -->
      <div class="wire-column left-col" id="left-column">
        <!-- Generated Dynamically -->
      </div>

      <!-- Right Column (Target Nodes) -->
      <div class="wire-column right-col" id="right-column">
        <!-- Generated Dynamically -->
      </div>
    </div>

    <!-- Success screen -->
    <div id="success-screen">
      <div class="success-banner">Task Complete!</div>
      <div class="success-sub">All electrical subsystems secured</div>
    </div>
  </div>

  <script>
    // Synthesize sounds using Web Audio API
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playTone(freq, type, duration, volume = 0.1) {
      try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) { console.warn(e); }
    }

    function playConnectSound() {
      playTone(600, 'square', 0.15, 0.15);
      setTimeout(() => {
        playTone(900, 'sine', 0.1, 0.1);
      }, 80);
    }

    function playCompleteSound() {
      playTone(523.25, 'sine', 0.15, 0.25); // C5
      setTimeout(() => playTone(659.25, 'sine', 0.15, 0.25), 100); // E5
      setTimeout(() => playTone(783.99, 'sine', 0.15, 0.25), 200); // G5
      setTimeout(() => playTone(1046.50, 'sine', 0.4, 0.35), 300); // C6
    }

    function playSparkSound() {
      try {
        initAudio();
        const bufferSize = audioCtx.sampleRate * 0.05;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = 1000;
        
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start();
      } catch (e) {}
    }

    // Game Logic
    const COLORS = [
      { name: 'red', hex: '#ff3b30' },
      { name: 'blue', hex: '#007aff' },
      { name: 'yellow', hex: '#ffcc00' },
      { name: 'magenta', hex: '#ff2d55' }
    ];

    // Shuffle helper
    function shuffle(array) {
      return array.slice().sort(() => Math.random() - 0.5);
    }

    const leftOrder = shuffle(COLORS);
    const rightOrder = shuffle(COLORS);

    const svg = document.getElementById('wiring-svg');
    const leftCol = document.getElementById('left-column');
    const rightCol = document.getElementById('right-column');
    const successScreen = document.getElementById('success-screen');
    const statusBadge = document.getElementById('status-badge');

    let connections = {}; // maps left color -> right color
    let activeDrag = null; // { color, startX, startY, currentX, currentY }

    // Render columns
    leftOrder.forEach((color, index) => {
      const node = document.createElement('div');
      node.className = 'wire-node';
      node.innerHTML = `
        <div class="connector ${color.name}" data-color="${color.name}" data-side="left" id="left-${color.name}"></div>
      `;
      leftCol.appendChild(node);
    });

    rightOrder.forEach((color, index) => {
      const node = document.createElement('div');
      node.className = 'wire-node';
      node.innerHTML = `
        <div class="connector ${color.name}" data-color="${color.name}" data-side="right" id="right-${color.name}"></div>
      `;
      rightCol.appendChild(node);
    });

    // Drawing wiring pathways
    function drawWires() {
      svg.innerHTML = '';
      const svgRect = svg.getBoundingClientRect();

      // Draw completed connections
      for (let leftColor in connections) {
        const rightColor = connections[leftColor];
        const leftEl = document.getElementById(`left-${leftColor}`);
        const rightEl = document.getElementById(`right-${rightColor}`);
        
        if (leftEl && rightEl) {
          const lRect = leftEl.getBoundingClientRect();
          const rRect = rightEl.getBoundingClientRect();
          
          const x1 = lRect.left + lRect.width / 2 - svgRect.left;
          const y1 = lRect.top + lRect.height / 2 - svgRect.top;
          const x2 = rRect.left + rRect.width / 2 - svgRect.left;
          const y2 = rRect.top + rRect.height / 2 - svgRect.top;
          
          drawWirePath(x1, y1, x2, y2, COLORS.find(c => c.name === leftColor).hex, false);
        }
      }

      // Draw active dragging wire
      if (activeDrag) {
        const leftEl = document.getElementById(`left-${activeDrag.color}`);
        const lRect = leftEl.getBoundingClientRect();
        const x1 = lRect.left + lRect.width / 2 - svgRect.left;
        const y1 = lRect.top + lRect.height / 2 - svgRect.top;
        const x2 = activeDrag.currentX - svgRect.left;
        const y2 = activeDrag.currentY - svgRect.top;
        
        drawWirePath(x1, y1, x2, y2, COLORS.find(c => c.name === activeDrag.color).hex, true);
      }
    }

    function drawWirePath(x1, y1, x2, y2, color, isDragging) {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      
      // Curved cubic bezier path for loose-hanging wires feel
      let ctrlX1 = x1 + (x2 - x1) * 0.4;
      let ctrlY1 = y1 + (isDragging ? 10 : 30); // Hang down
      let ctrlX2 = x1 + (x2 - x1) * 0.6;
      let ctrlY2 = y2 + (isDragging ? 10 : 30);

      const d = `M ${x1} ${y1} C ${ctrlX1} ${ctrlY1}, ${ctrlX2} ${ctrlY2}, ${x2} ${y2}`;
      
      path.setAttribute('d', d);
      path.setAttribute('stroke', color);
      path.setAttribute('stroke-width', '10');
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('filter', 'drop-shadow(0px 3px 4px rgba(0,0,0,0.4))');
      svg.appendChild(path);

      // Add an inner core glow
      const core = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      core.setAttribute('d', d);
      core.setAttribute('stroke', 'rgba(255,255,255,0.4)');
      core.setAttribute('stroke-width', '3');
      core.setAttribute('fill', 'none');
      core.setAttribute('stroke-linecap', 'round');
      svg.appendChild(core);
    }

    // Interaction handlers
    document.addEventListener('mousedown', (e) => {
      const target = e.target;
      if (target.classList.contains('connector') && target.dataset.side === 'left') {
        const color = target.dataset.color;
        // If already connected, do nothing (or let disconnect, but let's keep it connected)
        if (connections[color]) return;

        initAudio();
        playSparkSound();
        createSparks(e.clientX, e.clientY);
        
        activeDrag = {
          color: color,
          startX: e.clientX,
          startY: e.clientY,
          currentX: e.clientX,
          currentY: e.clientY
        };
        
        drawWires();
      }
    });

    document.addEventListener('mousemove', (e) => {
      if (activeDrag) {
        activeDrag.currentX = e.clientX;
        activeDrag.currentY = e.clientY;
        drawWires();
      }
    });

    document.addEventListener('mouseup', (e) => {
      if (activeDrag) {
        const target = e.target;
        if (target.classList.contains('connector') && target.dataset.side === 'right') {
          const rightColor = target.dataset.color;
          const leftColor = activeDrag.color;
          
          // Check if same color
          if (leftColor === rightColor) {
            connections[leftColor] = rightColor;
            playConnectSound();
            createSparks(e.clientX, e.clientY);
            checkCompletion();
          } else {
            // Wrong connection, buzz tone
            playTone(150, 'sawtooth', 0.15, 0.15);
          }
        }
        activeDrag = null;
        drawWires();
      }
    });

    // Spark Particles Effect
    function createSparks(x, y) {
      const board = document.getElementById('board');
      const boardRect = board.getBoundingClientRect();
      for (let i = 0; i < 8; i++) {
        const spark = document.createElement('div');
        spark.className = 'spark';
        spark.style.left = `${x - boardRect.left}px`;
        spark.style.top = `${y - boardRect.top}px`;
        board.appendChild(spark);

        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 80 + 30;
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed;
        
        let opacity = 1;
        let startTime = Date.now();
        const duration = 400;

        function anim() {
          const elapsed = Date.now() - startTime;
          const progress = elapsed / duration;
          if (progress >= 1) {
            spark.remove();
          } else {
            spark.style.transform = `translate(${vx * progress}px, ${vy * progress}px)`;
            spark.style.opacity = 1 - progress;
            requestAnimationFrame(anim);
          }
        }
        requestAnimationFrame(anim);
      }
    }

    function checkCompletion() {
      if (Object.keys(connections).length === 4) {
        statusBadge.innerText = 'Complete';
        statusBadge.style.color = '#34c759';
        statusBadge.style.borderColor = 'rgba(52, 199, 89, 0.3)';
        statusBadge.style.background = 'rgba(52, 199, 89, 0.1)';
        statusBadge.style.animation = 'none';
        
        setTimeout(() => {
          successScreen.style.display = 'flex';
          playCompleteSound();
          
          // Post task completion status back to parent iframe if running inside a modal
          if (window.parent) {
            window.parent.postMessage({ type: 'TASK_COMPLETE', task: 'Fix Wiring' }, '*');
          }
        }, 500);
      }
    }

    // Initial draw
    window.addEventListener('load', () => {
      drawWires();
    });
    
    window.addEventListener('resize', () => {
      drawWires();
    });
  </script>
</body>
</html>
