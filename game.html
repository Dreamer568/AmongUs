<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Among Us 3D - Standalone Remake</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Lexend+Deca:wght@400;900&display=swap');

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Lexend Deca', 'Segoe UI', sans-serif;
      background-color: #000000;
      color: #ffffff;
      user-select: none;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Screen-space Limited Vision Overlay (Spotlight effect) */
    #vision-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 4;
      background: radial-gradient(circle, transparent 24%, rgba(5, 5, 5, 0.98) 55%);
      transition: background 0.05s ease-out;
    }

    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      width: 10px; height: 10px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      z-index: 5;
      pointer-events: none;
    }

    /* Authentic Among Us HUD Styling */
    .hud-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      box-sizing: border-box;
    }

    .hud-top {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 15px;
      width: 100%;
    }

    /* Cartoon Bold UI Elements */
    .cartoon-panel {
      background: rgba(0, 0, 0, 0.65);
      border: 4px solid #000000;
      border-radius: 12px;
      box-shadow: 4px 4px 0px #000000;
      pointer-events: auto;
    }

    /* Top Center Progress Meter */
    .progress-hud {
      align-self: center;
      width: 90%;
      max-width: 500px;
      padding: 10px 15px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-lbl {
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      letter-spacing: 1px;
      color: #ffffff;
      text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, -2px 2px 0 #000;
    }

    .progress-bar-track {
      flex-grow: 1;
      height: 18px;
      background: #1e293b;
      border: 3px solid #000000;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: #00e676;
      border-right: 3px solid #000000;
      transition: width 0.4s cubic-bezier(0.19, 1, 0.22, 1);
    }

    /* Left Checklist */
    .task-card {
      padding: 15px;
      width: 280px;
      max-height: 50vh;
      overflow-y: auto;
    }

    .task-card h2 {
      margin: 0 0 10px 0;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: #f6e05e;
      letter-spacing: 0.5px;
      text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, -2px 2px 0 #000;
    }

    .task-checklist {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 0.85rem;
      font-weight: 900;
      line-height: 1.5rem;
    }

    .task-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      color: #ff4d4d;
      text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, -1px 1px 0 #000;
    }

    .task-checkbox.done {
      color: #00e676;
      text-decoration: line-through;
    }

    .checkbox-bullet {
      width: 10px;
      height: 10px;
      border: 2px solid #000000;
      border-radius: 30%;
      background: #ff4d4d;
      flex-shrink: 0;
    }

    .task-checkbox.done .checkbox-bullet {
      background: #00e676;
    }

    /* 2D HUD Minimap Box (Top Right Corner) */
    #minimap-anchor {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      z-index: 10;
      pointer-events: auto;
    }

    #minimap-container {
      width: 220px;
      height: 125px;
      background-image: url('The_Skeld_blank_map.png');
      background-size: cover;
      background-position: center;
      position: relative;
    }

    #minimap-player-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid #000000;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 5px rgba(255,255,255,0.8);
      pointer-events: none;
      z-index: 5;
    }

    #minimap-toggle-btn {
      background: rgba(0, 0, 0, 0.7);
      border: 3px solid #000;
      color: #a0aec0;
      font-family: 'Fredoka One', cursive;
      font-size: 0.7rem;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 2px 2px 0 #000;
      margin-top: 5px;
      text-transform: uppercase;
    }

    /* Use Button (Bottom Right) */
    .action-hud-bay {
      position: absolute;
      bottom: 25px;
      right: 25px;
      pointer-events: auto;
      z-index: 10;
    }

    .use-action-btn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #ea580c;
      border: 5px solid #000000;
      color: #ffffff;
      font-family: 'Fredoka One', cursive;
      font-weight: bold;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 4px 6px 0px #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, -2px 2px 0 #000;
      transition: transform 0.05s, background-color 0.1s;
    }

    .use-action-btn:active {
      transform: translate(2px, 3px);
      box-shadow: 2px 3px 0px #000000;
    }

    .use-btn-disabled {
      background: #555555 !important;
      color: #888888 !important;
      cursor: not-allowed;
    }

    /* Modal Styling */
    .modal-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-viewport {
      width: 600px;
      height: 460px;
      background: #1e293b;
      border: 6px solid #000000;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      box-shadow: 10px 10px 0px #000000;
    }

    .close-modal-btn {
      position: absolute;
      top: 10px;
      right: 18px;
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      color: #ff4d4d;
      cursor: pointer;
      z-index: 110;
      text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, -2px 2px 0 #000;
    }
    .close-modal-btn:hover { color: #ff1a1a; }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    /* Coordinates Panel */
    .pos-readout {
      position: absolute;
      bottom: 25px;
      left: 200px;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 900;
      color: #00e676;
      z-index: 10;
      pointer-events: none;
    }

    /* Landing Screen Overlay */
    #click-lock-prompt {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 8;
      cursor: pointer;
    }

    .prompt-box {
      border: 5px solid #000;
      border-radius: 16px;
      padding: 25px 40px;
      text-align: center;
      background: #1e293b;
      box-shadow: 8px 8px 0px #000000;
    }

    .prompt-box h2 {
      margin: 0 0 10px 0;
      color: #ea580c;
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      text-transform: uppercase;
      text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, -2px 2px 0 #000;
    }

    /* Loader UI */
    #loader {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #090c10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .spinner {
      width: 60px; height: 60px;
      border: 6px solid rgba(255, 255, 255, 0.05);
      border-top-color: #ea580c;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
  <!-- Load the Socket.io client script locally from Express (supports offline setups) -->
  <script src="/socket.io/socket.io.js"></script>
  <script type='importmap'>
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/",
        "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
      }
    }
  </script>
</head>
<body>

  <!-- Screen space vignette Overlay -->
  <div id="vision-overlay"></div>

  <!-- Loading Overlay -->
  <div id='loader'>
    <div class='spinner'></div>
    <p style='color: #a0aec0; font-family: Fredoka One, sans-serif; font-size: 1rem; margin-top: 20px; letter-spacing: 1px;'>LOADING SKELD SYSTEMS...</p>
  </div>

  <!-- Locked mouse context prompt -->
  <div id='click-lock-prompt'>
    <div class='prompt-box'>
      <h2>Start Mission</h2>
      <p style='margin: 0; font-size: 0.85rem; font-weight: 900; color: #a0aec0;'>Mouse to Look | W, A, S, D to Walk</p>
    </div>
  </div>

  <div id='crosshair'></div>

  <!-- Render Window -->
  <div id='canvas-container'></div>

  <!-- HUD Interface -->
  <div class='hud-layer'>
    
    <div class='hud-top'>
      <!-- Total Progress Tracker -->
      <div class='progress-hud cartoon-panel'>
        <span class='progress-lbl'>TOTAL PROGRESS</span>
        <div class='progress-bar-track'>
          <div class='progress-bar-fill' id='progress-fill'></div>
        </div>
      </div>

      <!-- Left Active Objectives checklist -->
      <div class='task-card cartoon-panel'>
        <h2>Task Checklist</h2>
        <ul class='task-checklist' id='task-list-items'>
          <!-- Loaded dynamically -->
        </ul>
      </div>
    </div>

    <!-- Active coordinate tracking values -->
    <div class='pos-readout cartoon-panel' id='coord-lbl'>COORDINATES: X: 0.00 | Y: 0.00 | Z: 0.00</div>

    <!-- Right HUD: Dynamic Minimap with HUD marker overlays -->
    <div id="minimap-anchor">
      <div id="minimap-container" class="cartoon-panel">
        <div id="minimap-player-dot"></div>
      </div>
      <button id="minimap-toggle-btn">Hide Minimap</button>
    </div>

    <!-- Interactive action buttons -->
    <div class='action-hud-bay'>
      <button class='use-action-btn use-btn-disabled' id='use-btn' disabled>Use</button>
    </div>

  </div>

  <!-- Dynamic Iframe Overlay Terminal modal -->
  <div class='modal-overlay' id='modal-overlay'>
    <div class='modal-viewport'>
      <div class='close-modal-btn' id='close-btn'>&times;</div>
      <iframe id='task-iframe' src='about:blank'></iframe>
    </div>
  </div>

  <!-- Main Game Script Module (Consolidated logic) -->
  <script type='module'>
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
    import * as CANNON from 'cannon-es';

    // Materials declared at top level
    const sphereNormalMaterial = new THREE.MeshStandardMaterial({
      color: 0xeab308, 
      metalness: 0.4,
      roughness: 0.3,
      emissive: 0x332600
    });
    
    const sphereActiveMaterial = new THREE.MeshStandardMaterial({
      color: 0x00e676,
      metalness: 0.4,
      roughness: 0.2,
      emissive: 0x003311
    });

    // Safeguarded global declaration
    function updateVisionOverlay(value) {
      const visionOverlay = document.getElementById('vision-overlay');
      if (visionOverlay) {
        const innerPercent = value * 0.45;
        const outerPercent = value;
        visionOverlay.style.background = `radial-gradient(circle, transparent ${innerPercent}%, rgba(5, 5, 5, 0.98) ${outerPercent}%)`;
      }
    }

    // Context objects
    let scene, camera, renderer, controls, transformControls;
    let mapModel = null;
    let taskSpheres = [];
    let activeNearSphere = null;
    let activeTaskSet = null;
    let completedTaskIds = new Set();
    let completed = false;
    let devMode = false;
    let showWalls = false;

    // Local light attached directly to player center
    let playerLight;

    // Cached active task state to prevent scope clearing conflicts on async task calls
    let currentlyOpenedTask = null;

    // Minimap projection matrix helper
    const map2DHelper = new THREE.Object3D();

    // Multiplayer Networking
    let socket = null;
    let localPlayerId = 'player_' + Math.random().toString(36).substr(2, 9);
    let localUsername = 'Crewmate_' + Math.floor(Math.random() * 100);
    let localColor = '#' + Math.floor(Math.random() * 16777215).toString(16);
    let remotePlayers = {}; // id -> { mesh, targetPos }

    const clock = new THREE.Clock();

    const container = document.getElementById('canvas-container');
    const loader = document.getElementById('loader');
    const clickPrompt = document.getElementById('click-lock-prompt');
    const coordLbl = document.getElementById('coord-lbl');
    const useBtn = document.getElementById('use-btn');
    const modal = document.getElementById('modal-overlay');
    const taskIframe = document.getElementById('task-iframe');
    const closeBtn = document.getElementById('close-btn');

    // Player details
    let playerMesh = null;
    let playerRadius = 0.35; 

    // Calibration Defaults (Speed: 4.0, Vision: 95%, Strength: 1.0)
    let playerSpeedSetting = 4.0; 
    let lightStrengthValue = 1.0;

    // Adjusted Spawn on fixed Y level (5.90) to prevent any falling glitches
    const playerPos = new THREE.Vector3(6.79, 5.90, -23.93); 

    const keysPressed = {};

    // ----------------------------------------------------
    // PHYSICAL WALLS LOADER & PHYSICS ENGINE
    // ----------------------------------------------------
    let physicalWalls = []; 
    let physicsWorld = null;
    let playerBody = null;

    function initPhysicsEngine() {
      physicsWorld = new CANNON.World();
      physicsWorld.gravity.set(0, 0, 0); // Locked strictly to a flat 5.90 plane

      // Smooth sliding setup
      physicsWorld.defaultContactMaterial.friction = 0.0;
      physicsWorld.defaultContactMaterial.restitution = 0.0;

      // Player physical body
      const sphereShape = new CANNON.Sphere(playerRadius);
      playerBody = new CANNON.Body({
        mass: 5,
        shape: sphereShape,
        position: new CANNON.Vec3(playerPos.x, playerPos.y, playerPos.z),
        linearDamping: 0.9,
        fixedRotation: true
      });
      physicsWorld.addBody(playerBody);

      // Floor Plane snapped to 5.55
      const floorShape = new CANNON.Plane();
      const floorBody = new CANNON.Body({
        mass: 0,
        shape: floorShape
      });
      floorBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
      floorBody.position.set(0, 5.55, 0);
      physicsWorld.addBody(floorBody);
    }

    // Spawn and track invisible / visible walls loaded from config JSON
    function spawnPhysicalWall(wallData) {
      if (!physicsWorld) return;

      const geo = new THREE.BoxGeometry(1, 1, 1);
      const mat = new THREE.MeshBasicMaterial({
        color: 0xff4d4d,
        transparent: true,
        opacity: 0.0,      
        visible: false,     
        wireframe: true
      });

      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.fromArray(wallData.position);
      mesh.scale.fromArray(wallData.scale);
      mesh.rotation.fromArray(wallData.rotation);

      scene.add(mesh);
      physicalWalls.push(mesh);

      // Spawn Static Cannon.js wall representation
      const halfExtents = new CANNON.Vec3(
        wallData.scale[0] / 2,
        wallData.scale[1] / 2,
        wallData.scale[2] / 2
      );
      const wallShape = new CANNON.Box(halfExtents);
      const wallBody = new CANNON.Body({
        mass: 0, 
        shape: wallShape,
        position: new CANNON.Vec3(wallData.position[0], wallData.position[1], wallData.position[2])
      });
      wallBody.quaternion.setFromEuler(wallData.rotation[0], wallData.rotation[1], wallData.rotation[2]);
      
      physicsWorld.addBody(wallBody);
    }

    // ----------------------------------------------------
    // INPUT LISTENERS & TRANSLATION
    // ----------------------------------------------------
    function setupInputListeners() {
      document.addEventListener('keydown', (e) => {
        keysPressed[e.key.toLowerCase()] = true;
      });
      document.addEventListener('keyup', (e) => {
        keysPressed[e.key.toLowerCase()] = false;
      });
    }

    function createPlayerMesh(sc, startPos) {
      // Hemisphere (Dome) geometry sitting flat on the deck
      const playerGeo = new THREE.SphereGeometry(playerRadius, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
      const playerMat = new THREE.MeshStandardMaterial({
        color: localColor,
        metalness: 0.1,
        roughness: 0.4,
        side: THREE.DoubleSide
      });
      const mesh = new THREE.Mesh(playerGeo, playerMat);
      mesh.position.copy(startPos);
      mesh.castShadow = true;
      
      sc.add(mesh);
      return mesh;
    }

    function calculateMovementVec(cam) {
      const moveDirection = new THREE.Vector3();

      if (keysPressed['w'] || keysPressed['arrowup'])    moveDirection.z += 1;
      if (keysPressed['s'] || keysPressed['arrowdown'])  moveDirection.z -= 1;
      if (keysPressed['a'] || keysPressed['arrowleft'])  moveDirection.x -= 1;
      if (keysPressed['d'] || keysPressed['arrowright']) moveDirection.x += 1;

      if (moveDirection.lengthSq() === 0) return new THREE.Vector3(0, 0, 0);
      moveDirection.normalize();

      const cameraForward = new THREE.Vector3();
      cam.getWorldDirection(cameraForward);
      cameraForward.y = 0;
      cameraForward.normalize();

      const cameraRight = new THREE.Vector3();
      cameraRight.crossVectors(cameraForward, new THREE.Vector3(0, 1, 0)).normalize();
      cameraRight.y = 0;
      cameraRight.normalize();

      const worldStep = new THREE.Vector3();
      worldStep.addScaledVector(cameraForward, moveDirection.z);
      worldStep.addScaledVector(cameraRight, moveDirection.x);
      
      return worldStep.normalize();
    }

    // ----------------------------------------------------
    // MULTIPLAYER NETWORKING & PROXIMITY VOICE SIGNALS
    // ----------------------------------------------------
    function initMultiplayerArray() {
      // Safe guard checking if local socket.io script loaded successfully (supports standalone offline)
      if (typeof io === 'undefined') {
        console.warn('Socket.io library not detected (running offline/single-player mode).');
        return;
      }

      // Connect to local Socket.io port automatically
      socket = io();

      socket.on('connect', () => {
        console.log('Linked to Skeld Core Socket.io Network Hub.');
        
        // Broadcast local profile
        socket.emit('join', {
          id: localPlayerId,
          username: localUsername,
          color: localColor,
          position: { x: playerPos.x, y: playerPos.y, z: playerPos.z },
          rotation: camera.rotation.y
        });
      });

      socket.on('initial_state', (data) => {
        data.players.forEach(p => spawnOtherPlayer(p));
      });

      socket.on('player_joined', (data) => {
        spawnOtherPlayer(data);
      });

      socket.on('player_moved', (data) => {
        updateOtherPlayer(data);
      });

      socket.on('player_left', (data) => {
        removeOtherPlayer(data.id);
      });
    }

    function spawnOtherPlayer(p) {
      if (remotePlayers[p.id]) return;

      // Render remote players as hemispherical domes
      const geo = new THREE.SphereGeometry(playerRadius, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
      const mat = new THREE.MeshStandardMaterial({
        color: p.color || 0x10b981,
        metalness: 0.1,
        roughness: 0.4,
        side: THREE.DoubleSide
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(p.position.x, p.position.y, p.position.z);
      scene.add(mesh);

      remotePlayers[p.id] = {
        id: p.id,
        mesh: mesh,
        targetPos: new THREE.Vector3(p.position.x, p.position.y, p.position.z)
      };
    }

    function updateOtherPlayer(p) {
      const op = remotePlayers[p.id];
      if (op) {
        op.targetPos.set(p.position.x, p.position.y, p.position.z);
        op.mesh.rotation.y = p.rotation;
      }
    }

    function removeOtherPlayer(id) {
      const op = remotePlayers[id];
      if (op) {
        scene.remove(op.mesh);
        delete remotePlayers[id];
      }
    }

    // ----------------------------------------------------
    // MISSION & INTERFACE SETUP
    // ----------------------------------------------------
    async function loadActiveTaskSet() {
      try {
        const response = await fetch('/task_sets.json');
        if (response.ok) {
          const data = await response.json();
          const sets = data.task_sets;
          const chosenSet = sets[Math.floor(Math.random() * sets.length)];
          renderTaskListUI(chosenSet);
          return chosenSet;
        }
      } catch (err) {
        console.error('Failed to load task sets:', err);
      }
      return null;
    }

    function renderTaskListUI(chosenSet) {
      const listEl = document.getElementById('task-list-items');
      listEl.innerHTML = '';
      
      if (!chosenSet) return;

      chosenSet.tasks.forEach((t, idx) => {
        const item = document.createElement('li');
        item.className = 'task-checkbox';
        item.id = 'task-item-' + idx;
        item.innerHTML = `<span class='checkbox-bullet'></span> ${t.room} - ${t.name}`;
        listEl.appendChild(item);
      });
    }

    // Spawns and maps task sphere overlays onto HUD Minimap coordinates
    function setupMinimapTasks() {
      const container = document.getElementById('minimap-container');
      if (!container) return;

      // Clear existing overlays
      const oldDots = container.querySelectorAll('.minimap-task-dot');
      oldDots.forEach(d => d.remove());

      taskSpheres.forEach(s => {
        const localTaskPos = new THREE.Vector3();
        map2DHelper.worldToLocal(localTaskPos.copy(s.mesh.position));
        
        const u = localTaskPos.x + 0.5;
        const v = localTaskPos.y + 0.5;

        const dot = document.createElement('div');
        dot.className = 'minimap-task-dot';
        dot.id = `minimap-task-dot-${s.id}`;
        dot.style.position = 'absolute';
        dot.style.width = '8px';
        dot.style.height = '8px';
        dot.style.borderRadius = '50%';
        dot.style.background = '#f6e05e';
        dot.style.border = '1.5px solid #000';
        dot.style.boxShadow = '0 0 4px #ffff00';
        dot.style.left = `${u * 100}%`;
        dot.style.top = `${(1 - v) * 100}%`;
        dot.style.transform = 'translate(-50%, -50%)';
        dot.style.pointerEvents = 'none';
        
        container.appendChild(dot);
      });
    }

    async function loadProjectConfig() {
      try {
        const response = await fetch('/config.json');
        if (!response.ok) return;
        const config = await response.json();

        // Load 2D HUD map parameters into calculation projection helper
        if (config.map2d) {
          map2DHelper.position.fromArray(config.map2d.position);
          map2DHelper.rotation.fromArray(config.map2d.rotation);
          map2DHelper.scale.fromArray(config.map2d.scale);
          map2DHelper.updateMatrixWorld(true);
        } else {
          // Hardcoded layout baseline fallback values
          map2DHelper.position.set(5.577, 7.1, -11.557);
          map2DHelper.rotation.set(-Math.PI / 2, 0, 0);
          map2DHelper.scale.set(60.9, 34.5, 1);
          map2DHelper.updateMatrixWorld(true);
        }

        const loaderGLTF = new GLTFLoader();
        
        // Initialize DRACOLoader mesh decoder
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://unpkg.com/three@0.152.2/examples/jsm/libs/draco/');
        loaderGLTF.setDRACOLoader(dracoLoader);

        loaderGLTF.load('/among_us_-_map_the_skeld.glb', (gltf) => {
          mapModel = gltf.scene;
          
          if (config.map) {
            mapModel.position.fromArray(config.map.position);
            mapModel.rotation.fromArray(config.map.rotation);
            mapModel.scale.fromArray(config.map.scale);
          }

          mapModel.traverse((node) => {
            if (node.isMesh) {
              node.receiveShadow = true;
              node.material.roughness = 0.85;
            }
          });
          
          scene.add(mapModel);
        });

        if (config.tasks) {
          config.tasks.forEach(t => {
            // Find if this specific config task is listed in active checklist set
            const taskMatch = findMatchedTask(t, activeTaskSet);
            
            if (taskMatch) {
              const sphereGeo = new THREE.SphereGeometry(0.35, 16, 16);
              const sphere = new THREE.Mesh(sphereGeo, sphereNormalMaterial.clone());
              
              sphere.position.fromArray(t.position);
              sphere.frustumCulled = false;

              // Soft, optimized color-matched point light glow on tasks (subtle glow intensity 0.8)
              const sphereGlow = new THREE.PointLight(0xeab308, 0.8, 6);
              sphere.add(sphereGlow);

              scene.add(sphere);
              
              taskSpheres.push({
                id: t.id,
                metadata: t,
                mesh: sphere,
                completed: false
              });
            }
          });
        }
        
        // Spawn active tasks on the Minimap HUD
        setupMinimapTasks();

      } catch (err) {
        console.error('Failed to load map configurations:', err);
      }
    }

    // Dynamic walls loading from JSON
    async function loadInvisibleWalls() {
      try {
        const response = await fetch('/walls.json');
        if (response.ok) {
          const data = await response.json();
          if (data.walls) {
            data.walls.forEach(w => spawnPhysicalWall(w));
          }
        } else {
          // Fallback wall elements loaded if /walls.json is missing
          const fallbackWalls = [
            {
              id: "wall_1",
              position: [-5.172, 7.017, 3.124],
              scale: [9.698, 4, 0.202],
              rotation: [0, 0, 0]
            },
            {
              id: "wall_2",
              position: [-1.726, 7.017, 0.256],
              scale: [4.454, 4, 0.202],
              rotation: [0, 3.100, 0]
            },
            {
              id: "wall_3",
              position: [1.791, 7.017, 4.819],
              scale: [4.325, 4, 0.202],
              rotation: [0, -0.782, 0]
            },
            {
              id: "wall_4",
              position: [3.823, 7.017, 6.829],
              scale: [1.251, 4, 0.202],
              rotation: [0, -0.699, 0]
            }
          ];
          fallbackWalls.forEach(w => spawnPhysicalWall(w));
        }
      } catch (e) {
        console.warn("Failed fetching walls database file.", e);
      }
    }

    // ----------------------------------------------------
    // PROXIMITY DETECTION
    // ----------------------------------------------------
    function evaluateProximity() {
      if (completed) return;
      
      let nearSphere = null;
      let minDist = 3.2; 

      taskSpheres.forEach(s => {
        if (s.completed) return; // Skip completed tasks
        const dist = playerPos.distanceTo(s.mesh.position);
        if (dist < minDist) {
          minDist = dist;
          nearSphere = s;
        }
      });

      if (nearSphere !== activeNearSphere) {
        if (activeNearSphere && !activeNearSphere.completed) {
          activeNearSphere.mesh.material = sphereNormalMaterial;
        }
        
        activeNearSphere = nearSphere;
        
        if (activeNearSphere) {
          const taskMatch = findMatchedTask(activeNearSphere.metadata, activeTaskSet);
          
          if (taskMatch) {
            activeNearSphere.mesh.material = sphereActiveMaterial;
            useBtn.classList.remove('use-btn-disabled');
            useBtn.disabled = false;
            useBtn.innerText = 'USE';
          } else {
            useBtn.classList.add('use-btn-disabled');
            useBtn.disabled = true;
            useBtn.innerText = 'LOCKED';
          }
        } else {
          useBtn.classList.add('use-btn-disabled');
          useBtn.disabled = true;
          useBtn.innerText = 'USE';
        }
      }
    }

    function findMatchedTask(metadata, taskSet) {
      if (!taskSet) return null;
      return taskSet.tasks.find(t => {
        return t.room.toLowerCase() === metadata.room.toLowerCase() && 
               metadata.task.toLowerCase().includes(t.name.toLowerCase().split(' (')[0]);
      });
    }

    function openActiveTask() {
      if (!activeNearSphere || completed || activeNearSphere.completed) return;
      
      const matchedTaskInSet = findMatchedTask(activeNearSphere.metadata, activeTaskSet);
      
      if (matchedTaskInSet) {
        currentlyOpenedTask = activeNearSphere; // Cache active task to prevent closure bugs
        const file = matchedTaskInSet.file;
        const params = matchedTaskInSet.params || '';
        
        controls.unlock(); 
        
        taskIframe.src = file + params;
        modal.style.display = 'flex';
      }
    }

    function closeModal() {
      modal.style.display = 'none';
      taskIframe.src = 'about:blank';
      
      // Reset task cache
      currentlyOpenedTask = null;

      // Force return keyboard input focus to player canvas view
      window.focus();
      document.body.focus();
      renderer.domElement.focus();
      
      setTimeout(() => {
        if (!completed && !devMode) {
          controls.lock();
        }
      }, 100);
    }

    // ----------------------------------------------------
    // SYSTEM ENGINE LOOPS
    // ----------------------------------------------------
    init();

    async function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050505);
      scene.fog = new THREE.FogExp2(0x050505, 0.008);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.copy(playerPos);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);

      // Advanced ACES Film grade mapping for realistic dark space lighting
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      container.appendChild(renderer.domElement);

      // Local spotlight attached directly to inside of player capsule (intensity 1.0 default)
      playerLight = new THREE.PointLight(0xffffff, lightStrengthValue, 25);
      scene.add(playerLight);

      // Setup Physics Engine first
      initPhysicsEngine();

      controls = new PointerLockControls(camera, renderer.domElement);
      
      clickPrompt.addEventListener('click', () => {
        if (modal.style.display !== 'flex' && !devMode) {
          controls.lock();
        }
      });

      controls.addEventListener('lock', () => {
        clickPrompt.style.display = 'none';
      });

      controls.addEventListener('unlock', () => {
        if (modal.style.display !== 'flex' && !devMode) {
          clickPrompt.style.display = 'flex';
        }
      });

      playerMesh = createPlayerMesh(scene, playerPos);
      playerMesh.visible = false; // Hidden normally to prevent culling view issues

      transformControls = new TransformControls(camera, renderer.domElement);
      transformControls.size = 0.85;
      scene.add(transformControls);

      transformControls.addEventListener('change', () => {
        if (devMode && playerMesh) {
          playerPos.copy(playerMesh.position);
          playerBody.position.copy(playerPos);
          playerBody.velocity.set(0, 0, 0); // Freeze velocity during direct drags
          camera.position.copy(playerPos);
          coordLbl.innerText = `COORDINATES: X: ${playerPos.x.toFixed(2)} | Y: ${playerPos.y.toFixed(2)} | Z: ${playerPos.z.toFixed(2)}`;
        }
      });

      // Disable camera movements while dragging Gizmos
      transformControls.addEventListener('dragging-changed', (e) => {
        controls.enabled = !e.value;
      });

      window.addEventListener('resize', onWindowResize);
      useBtn.addEventListener('mousedown', openActiveTask);
      closeBtn.addEventListener('mousedown', closeModal);

      document.addEventListener('mousedown', (e) => {
        if (controls.isLocked && activeNearSphere && e.button === 0) { 
          openActiveTask();
        }
      });

      setupInputListeners();
      setupSettingsListeners();

      // Retrieve default slider values from HTML inputs on load to prevent refresh mismatch
      playerSpeedSetting = parseFloat(document.getElementById('player-speed-slider').value);
      lightStrengthValue = parseFloat(document.getElementById('strength-slider').value);
      const initialVision = parseInt(document.getElementById('vision-slider').value);
      
      activeTaskSet = await loadActiveTaskSet();
      await loadProjectConfig();
      await loadInvisibleWalls();

      // Update vision overlay values
      updateVisionOverlay(initialVision);

      // Connect to multiplayer socket lobby
      initMultiplayerArray();

      loader.style.display = 'none';
      
      clock.getDelta(); 
      animate();
    }

    function updatePlayerMovement() {
      // Safety checks: Skip movement evaluations until physics systems are initialized
      if (!physicsWorld || !playerBody) return;
      if (completed || devMode) return; 
      if (modal.style.display === 'flex') return;
      if (!controls.isLocked) return;

      const moveDirection = calculateMovementVec(camera);

      // Map move controls straight into Cannon physics engine velocities
      if (moveDirection.lengthSq() > 0) {
        playerBody.velocity.x = moveDirection.x * playerSpeedSetting;
        playerBody.velocity.z = moveDirection.z * playerSpeedSetting;
      } else {
        playerBody.velocity.x = 0;
        playerBody.velocity.z = 0;
      }
    }

    function updateAmbientSpheres() {
      const elapsed = Date.now() * 0.0025;
      taskSpheres.forEach(s => {
        if (s.completed) return;
        s.mesh.position.y = s.metadata.position[1] + Math.sin(elapsed + s.metadata.position[0]) * 0.08;
        s.mesh.rotation.y += 0.015;
      });
    }

    function resolveTaskCompleted() {
      // Safe assignment of the active sphere to ensure the modal closes even on culling bugs
      const activeSphere = currentlyOpenedTask || activeNearSphere;

      try {
        if (activeSphere && activeTaskSet) {
          const matchedTaskInSet = findMatchedTask(activeSphere.metadata, activeTaskSet);
          if (matchedTaskInSet) {
            const idx = activeTaskSet.tasks.indexOf(matchedTaskInSet);
            
            if (idx !== -1 && !completedTaskIds.has(idx)) {
              completedTaskIds.add(idx);
              
              const item = document.getElementById('task-item-' + idx);
              if (item) {
                item.classList.add('done');
              }

              // Disable Completed Object
              activeSphere.completed = true;
              activeSphere.mesh.material = sphereActiveMaterial;
              activeSphere.mesh.position.y = -500; // Move underground out of sight
              
              // Remove completed task marker on HUD Minimap
              const dot = document.getElementById(`minimap-task-dot-${activeSphere.id}`);
              if (dot) dot.remove();

              // Send task completion broadcast packet to server (Socket.io)
              if (socket && socket.connected) {
                socket.emit('task_complete', {
                  username: localUsername,
                  taskName: matchedTaskInSet.name
                });
              }

              playTone(880, 'sine', 0.12, 0.1);
              updateTotalProgress();
            }
          }
        }
      } catch (err) {
        console.error('Task closure verification exception:', err);
      }
      
      // Close modal immediately
      closeModal();
    }

    function updateTotalProgress() {
      const total = activeTaskSet.tasks.length;
      const compCount = completedTaskIds.size;
      const ratio = (compCount / total) * 100;
      
      const progressFill = document.getElementById('progress-fill');
      if (progressFill) {
        progressFill.style.width = ratio + '%';
      }

      if (compCount === total) {
        completed = true;
        controls.unlock();
        setTimeout(() => {
          playIgnitionChime();
          alert('MISSION SECURED! SKELD POWER CORES COMPLETED.');
        }, 800);
      }
    }

    function playIgnitionChime() {
      playTone(523.25, 'sine', 0.15, 0.15);
      setTimeout(() => playTone(659.25, 'sine', 0.15, 0.15), 100);
      setTimeout(() => playTone(783.99, 'sine', 0.15, 0.15), 200);
      setTimeout(() => playTone(1046.50, 'sine', 0.4, 0.25), 300);
    }

    function playTone(freq, type, duration, volume = 0.1) {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    function updateMinimapPosition() {
      if (!map2DHelper) return;
      
      const localPlayerPos = new THREE.Vector3();
      map2DHelper.worldToLocal(localPlayerPos.copy(playerPos));

      const u = localPlayerPos.x + 0.5;
      const v = localPlayerPos.y + 0.5;

      const playerMarker = document.getElementById('minimap-player-dot');
      if (playerMarker) {
        // Draw matching colored player dot on HUD canvas coordinates
        playerMarker.style.background = localColor;
        playerMarker.style.left = `${u * 100}%`;
        playerMarker.style.top = `${(1 - v) * 100}%`;
      }
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      const deltaTime = Math.min(clock.getDelta(), 0.1);
      
      // ABSOLUTE PROTECTION FOR ASYNC REFRESH CRASHES
      if (!physicsWorld || !playerBody || !playerMesh || !renderer || !scene || !camera) {
        return; 
      }

      // Step the Physics World simulation only if active
      physicsWorld.step(deltaTime);
      
      // Lock player strictly to the fixed plane Y: 5.90 to disable gravity falls entirely
      playerBody.position.y = 5.90;
      playerBody.velocity.y = 0;

      // Sync Player position vectors
      playerPos.copy(playerBody.position);
      playerMesh.position.copy(playerPos);
      camera.position.copy(playerPos);

      // Sync local spotlight position
      if (playerLight) {
        playerLight.position.copy(playerPos);
        playerLight.position.y += 0.4; // Slightly elevated waist height
      }

      // Sync local player position onto 2D HUD Minimap coordinates
      updateMinimapPosition();

      // Interpolate and smooth other remote player movements on tick
      for (const id in remotePlayers) {
        const op = remotePlayers[id];
        op.mesh.position.lerp(op.targetPos, 0.15);
      }

      // Broadcast position parameters to other players (Socket.io)
      if (socket && socket.connected) {
        socket.emit('move', {
          position: { x: playerPos.x, y: playerPos.y, z: playerPos.z },
          rotation: camera.rotation.y
        });
      }

      updateAmbientSpheres();
      updatePlayerMovement();
      evaluateProximity();
      
      renderer.render(scene, camera);
      coordLbl.innerText = `COORDINATES: X: ${playerPos.x.toFixed(2)} | Y: ${playerPos.y.toFixed(2)} | Z: ${playerPos.z.toFixed(2)}`;
    }

    function setupSettingsListeners() {
      window.addEventListener('update-player-speed', (e) => {
        playerSpeedSetting = e.detail;
      });

      window.addEventListener('update-vision', (e) => {
        updateVisionOverlay(e.detail);
      });

      window.addEventListener('update-light-strength', (e) => {
        lightStrengthValue = e.detail;
        if (playerLight) {
          playerLight.intensity = e.detail;
        }
      });
    }

    // Toggle Minimap HUD Drawer Visibility
    const miniToggle = document.getElementById('minimap-toggle-btn');
    const miniContainer = document.getElementById('minimap-container');
    if (miniToggle && miniContainer) {
      miniToggle.addEventListener('click', () => {
        if (miniContainer.style.display === 'none') {
          miniContainer.style.display = 'block';
          miniToggle.innerText = 'Hide Minimap';
        } else {
          miniContainer.style.display = 'none';
          miniToggle.innerText = 'Show Minimap';
        }
      });
    }
  </script>

  <!-- Options Drawer -->

    <button id='settings-btn' style='background: rgba(0, 0, 0, 0.7); border: 3px solid #000; font-family: Lexend Deca, sans-serif; color: #a0aec0; border-radius: 8px; padding: 10px 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; box-shadow: 3px 3px 0 #000;'>Settings</button>
  </div>

  <div id='settings-drawer' style='position: absolute; bottom: 85px; left: 25px; z-index: 15; background: #1e293b; border: 4px solid #000; border-radius: 12px; padding: 15px; width: 220px; display: none; flex-direction: column; gap: 15px; box-shadow: 4px 4px 0px #000; pointer-events: auto;'>

    <div style='display: flex; flex-direction: column; gap: 4px;'>
      <label style='font-size: 0.65rem; color: #a0aec0; font-weight: bold; text-transform: uppercase;'>Player Speed: <span id="speed-val">4.0</span></label>
      <input type='range' id='player-speed-slider' min='3' max='20' step='0.5' value='4.0' style='cursor: pointer; accent-color: #ea580c;' />
    </div>

      <label style='font-size: 0.65rem; color: #a0aec0; font-weight: bold; text-transform: uppercase;'>Vision Range: <span id="vision-val">95</span>%</label>
      <input type='range' id='vision-slider' min='15' max='100' step='5' value='95' style='cursor: pointer; accent-color: #ea580c;' />
    </div>

    <div style='display: flex; flex-direction: column; gap: 4px;'>

      <input type='range' id='strength-slider' min='0.1' max='5' step='0.1' value='1.0' style='cursor: pointer; accent-color: #ea580c;' />

      sDrawer.style.display = sDrawer.style.display === 'flex' ? 'none' : 'flex';

      strengthSlider.addEventListener('input', (e) => {

        document.getElementById('strength-val').innerText = val.toFixed(1);

      });
    });
  </script>
